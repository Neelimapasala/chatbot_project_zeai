<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeAI Soft | Admin Login</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<div class="background">
    <div class="background-circle one"></div>
    <div class="background-circle two"></div>
</div>

<div class="login-container">

    <!-- LOGIN CARD -->
    <div class="login-card" id="loginCard">
        <!-- Logo -->
        <div class="logo">
            <img src="logo (2).jpeg" alt="ZeAI Soft">
        </div>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- Heading -->
        <div class="heading">
            <div class="icon">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h2>Admin Login</h2>
            <p>Authorized Personnel Only</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm">
            <!-- Email -->
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-box">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label>Password</label>
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <i class="fa-regular fa-eye eye" id="togglePassword"></i>
                </div>
            </div>

            <!-- Forgot Password -->
            <div class="forgot">
                <a href="#" id="forgotPasswordLink">Forgot Password?</a>
            </div>

            <!-- Button -->
            <button class="login-btn" type="submit">
                <i class="fa-solid fa-right-to-bracket"></i>
                Sign In
            </button>
        </form>

        <!-- Footer -->
        <div class="footer">
            <p>Restricted to authorized ZeAI Soft administrators.</p>
            <span>EMPOWERING YOU</span>
        </div>
    </div>

    <!-- FORGOT PASSWORD CARD (Hidden by default) -->
    <div class="login-card hide" id="forgotCard">
        <!-- Heading -->
        <div class="heading">
            <div class="icon">
                <i class="fa-solid fa-key"></i>
            </div>
            <h2>Reset Password</h2>
            <p>Follow the steps to reset your password</p>
        </div>

        <!-- Step 1: Request OTP -->
        <form id="requestOtpForm">
            <div class="form-group">
                <label>Email or Phone Number</label>
                <div class="input-box">
                    <i class="fa-solid fa-user-shield"></i>
                    <input type="text" id="resetIdentifier" placeholder="Email or Phone Number" required>
                </div>
            </div>
            <button class="login-btn" type="submit">Send OTP</button>
        </form>

        <!-- Step 2: Verify OTP & New Password (Hidden until Step 1 complete) -->
        <form id="resetPasswordForm" class="hide">
            <div class="form-group">
                <label>Enter OTP</label>
                <div class="input-box">
                    <i class="fa-solid fa-circle-check"></i>
                    <input type="text" id="otpCode" placeholder="Enter 6-digit OTP" required>
                </div>
            </div>

            <div class="form-group">
                <label>New Password</label>
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="newPassword" placeholder="Enter new password" required>
                </div>
            </div>

            <div class="form-group">
                <label>Confirm New Password</label>
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                </div>
            </div>

            <button class="login-btn" type="submit">Reset Password</button>
        </form>

        <div class="forgot" style="text-align: center; margin-top: 15px;">
            <a href="#" id="backToLoginLink"><i class="fa-solid fa-arrow-left"></i> Back to Login</a>
        </div>
    </div>

</div>

<!-- Flash Message Notifications -->
<div id="flashMessage" class="flash-message">
    <i class="fa-solid fa-circle-check"></i>
    <span id="flashText">Signed in successfully!</span>
</div>

<script src="script.js"></script>
</body>
</html>
