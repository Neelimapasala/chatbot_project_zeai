<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ZeAI Soft — Settings</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  
:root{
  --bg:#D0BDF4;
  --bg-alt:#DCCEF8;
  --panel:#FFFFFF;
  --panel-solid:#F6F0FE;
  --border:rgba(91,33,182,0.16);
  --border-strong:rgba(91,33,182,0.4);
  --purple:#8B5CF6;
  --purple-light:#7C3AED;
  --purple-dark:#5B21B6;
  --text:#241B3D;
  --text-muted:#6B6480;
}
*{font-family:sans-serif !important;}
body{background:var(--bg)!important;color:var(--text);}

  * { font-family:sans-serif; }
  .blob { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.30; pointer-events: none; z-index: 0; animation: blobFloat 20s ease-in-out infinite; }
  .blob-1 { width: 500px; height: 500px; background: #a78bfa; top: 60px; right: 60px; animation-duration: 24s; }
  .blob-2 { width: 450px; height: 450px; background: #7c3aed; bottom: 40px; left: 60px; animation-duration: 18s; animation-delay: -6s; }
  @keyframes blobFloat {
    0%   { transform: translate(0,0) scale(1); }
    25%  { transform: translate(40px,60px) scale(1.1); }
    50%  { transform: translate(-30px,30px) scale(0.95); }
    75%  { transform: translate(30px,-40px) scale(1.05); }
    100% { transform: translate(0,0) scale(1); }
  }
  .hover-card { transition: transform 0.25s cubic-bezier(.22,1,.36,1), box-shadow 0.25s ease, border-color 0.25s ease; }
  .hover-card:hover { transform: translateY(-4px) scale(1.008); border-color: var(--border-strong) !important; box-shadow: 0 12px 32px rgba(124,58,237,0.18) !important; }
  .status-card { transition: all 0.25s ease; }
  .status-card:hover { border-color: var(--border-strong); background-color: #F6F0FE; transform: translateY(-3px); box-shadow: 0 6px 20px rgba(124,58,237,0.12); }
  .sidebar-item { transition: all 0.2s ease; }
  .sidebar-item:hover:not(.active) { transform: translateX(3px); }
  .toggle-dot { transition: left 0.2s cubic-bezier(.5,1.5,.5,1); }
  .nav-link { position: relative; }
  .nav-underline { position: absolute; bottom: 0; left: 14px; right: 14px; height: 2px; background: #7C3AED; border-radius: 999px; }
  .page-enter { animation: pageIn 0.32s cubic-bezier(.4,0,.2,1); }
  @keyframes pageIn { from { opacity: 0; transform: translateY(18px);} to { opacity: 1; transform: translateY(0);} }
  .panel-enter { animation: panelIn 0.25s cubic-bezier(.4,0,.2,1); }
  @keyframes panelIn { from { opacity: 0; transform: translateY(10px);} to { opacity: 1; transform: translateY(0);} }
  .spin { animation: spin 0.8s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }
</style>
</head>
<body >
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

/* ── Minimal inline icon set ───────────────────────────────── */
const Icon = ({ children, className = "w-5 h-5" }) => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
       strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
);
const KeyIcon      = (p) => <Icon {...p}><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></Icon>;
const PlugIcon     = (p) => <Icon {...p}><path d="M12 22v-5"/><path d="M9 8V2"/><path d="M15 8V2"/><path d="M18 8v3a4 4 0 0 1-4 4h-4a4 4 0 0 1-4-4V8Z"/></Icon>;
const DbIcon       = (p) => <Icon {...p}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></Icon>;
const ChatsIcon    = (p) => <Icon {...p}><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></Icon>;
const BellIcon     = (p) => <Icon {...p}><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></Icon>;
const PaletteIcon  = (p) => <Icon {...p}><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2a10 10 0 1 0 0 20 2.5 2.5 0 0 0 0-5H10a2 2 0 0 1 0-4h9a1 1 0 0 0 1-1 9.96 9.96 0 0 0-8-9.8z"/></Icon>;
const BackupIcon   = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>;
const InfoIcon     = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></Icon>;
const EyeIcon      = (p) => <Icon {...p}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></Icon>;
const EyeOffIcon   = (p) => <Icon {...p}><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.6 18.6 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></Icon>;
const CheckIcon    = (p) => <Icon {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></Icon>;
const RefreshIcon  = (p) => <Icon {...p}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></Icon>;
const FolderIcon   = (p) => <Icon {...p}><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></Icon>;
const ZapIcon      = (p) => <Icon {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></Icon>;
const SunIcon      = (p) => <Icon {...p}><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></Icon>;
const MoonIcon     = (p) => <Icon {...p}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></Icon>;
const DownloadIcon = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>;
const UploadIcon   = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></Icon>;
const CalendarIcon = (p) => <Icon {...p}><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></Icon>;
const CloudIcon    = (p) => <Icon {...p}><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></Icon>;
const ServerIcon   = (p) => <Icon {...p}><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></Icon>;
const TrashIcon    = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></Icon>;
const MailIcon     = (p) => <Icon {...p}><path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/><polyline points="22 6 12 13 2 6"/></Icon>;
const ChevronIcon  = (p) => <Icon {...p}><polyline points="6 9 12 15 18 9"/></Icon>;
const LogoutIcon   = (p) => <Icon {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></Icon>;

/* ── Shared components ─────────────────────────────────────── */
function Card({ children, className = "" }) {
  return <div className={`hover-card bg-white rounded-2xl border-2 border-[rgba(91,33,182,0.16)] shadow-[0_2px_12px_rgba(124,58,237,0.08)] ${className}`}>{children}</div>;
}

function SelectField({ value, options, onChange }) {
  const [open, setOpen] = useState(false);
  return (
    <div className="relative">
      <button type="button" onClick={() => setOpen(!open)}
        className="w-full flex items-center justify-between border-2 border-[rgba(91,33,182,0.16)] rounded-xl px-4 py-2.5 text-sm text-[#241B3D] bg-white hover:border-[var(--border-strong)] transition-colors">
        {value}<ChevronIcon className={`w-4 h-4 text-[#6b6880] transition-transform ${open ? "rotate-180" : ""}`} />
      </button>
      {open && (
        <div className="absolute left-0 right-0 top-full mt-1 bg-white border-2 border-[rgba(91,33,182,0.16)] rounded-xl shadow-lg py-1 z-20">
          {options.map((opt) => (
            <button key={opt} type="button" onClick={() => { onChange(opt); setOpen(false); }}
              className={`w-full text-left px-4 py-2 text-sm ${opt===value ? "text-[#7C3AED] font-semibold " : "text-[#6b6880] hover:"}`}>
              {opt}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function Toggle({ checked, onChange }) {
  return (
    <button onClick={onChange} className={`relative w-11 h-6 rounded-full flex-shrink-0 transition-colors duration-200 ${checked ? "bg-[#7C3AED]" : "bg-[rgba(91,33,182,0.16)]"}`}>
      <span className="toggle-dot absolute top-0.5 w-5 h-5 bg-white rounded-full shadow" style={{ left: checked ? "22px" : "2px" }}></span>
    </button>
  );
}

function ToggleRow({ label, description, checked, onChange }) {
  return (
    <div className="flex items-center justify-between px-4 py-4 rounded-xl border-2 border-[rgba(91,33,182,0.16)] hover:bg-[#F6F0FE] hover:border-[var(--border-strong)] transition-colors">
      <div className="pr-6">
        <p className="text-sm font-medium text-[#241B3D]">{label}</p>
        <p className="text-[11px] text-[#6b6880] mt-0.5">{description}</p>
      </div>
      <Toggle checked={checked} onChange={onChange} />
    </div>
  );
}

function PanelHeader({ Icon: I, title, subtitle }) {
  return (
    <div className="px-8 py-6 border-b border-[#f0edf9] flex items-start gap-4">
      <div className="w-10 h-10 rounded-xl bg-violet-100 flex items-center justify-center flex-shrink-0">
        <I className="w-5 h-5 text-[#7C3AED]" />
      </div>
      <div>
        <h2 className="text-base font-semibold text-[#241B3D]">{title}</h2>
        <p className="text-sm text-[#6b6880] mt-0.5">{subtitle}</p>
      </div>
    </div>
  );
}

/* ── Sidebar items ─────────────────────────────────────────── */
const sidebarItems = [
  { label: "Change Password",    Icon: KeyIcon,    id: "password" },
  { label: "API Configuration",  Icon: PlugIcon,   id: "api" },
  { label: "Knowledge Base",     Icon: DbIcon,     id: "knowledge" },
  { label: "Chat Management",    Icon: ChatsIcon,  id: "chat" },
  { label: "Notifications",      Icon: BellIcon,   id: "notifications" },
  { label: "Theme Settings",     Icon: PaletteIcon,id: "theme" },
  { label: "Backup & Restore",   Icon: BackupIcon, id: "backup" },
  { label: "System Information", Icon: InfoIcon,   id: "system" },
];

/* ── Change Password panel ─────────────────────────────────── */
function getStrength(pw) {
  if (!pw) return { label: "", score: 0 };
  let score = 0;
  if (pw.length >= 8) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  if (pw.length >= 12) score++;
  const labels = ["Weak","Weak","Fair","Good","Strong","Very Strong"];
  return { label: labels[score], score };
}

function ChangePasswordPanel() {
  const [current, setCurrent] = useState("");
  const [next, setNext] = useState("");
  const [confirm, setConfirm] = useState("");
  const [showCurrent, setShowCurrent] = useState(false);
  const [showNext, setShowNext] = useState(false);
  const [showConfirm, setShowConfirm] = useState(false);
  const strength = getStrength(next);
  const reqs = [
    { label: "At least 8 characters", met: next.length >= 8 },
    { label: "One uppercase letter",  met: /[A-Z]/.test(next) },
    { label: "One number",            met: /[0-9]/.test(next) },
    { label: "One special character", met: /[^A-Za-z0-9]/.test(next) },
  ];
  const barColors = ["#ef4444","#ef4444","#f97316","#eab308","#22c55e","#16a34a"];

  return (
    <Card className="overflow-hidden">
      <PanelHeader Icon={KeyIcon} title="Change Admin Password" subtitle="Update your admin account password" />
      <div className="p-8 space-y-5 max-w-md">
        {[
          { label: "Current Password", value: current, set: setCurrent, show: showCurrent, setShow: setShowCurrent, ph: "Enter current password" },
          { label: "New Password",     value: next,    set: setNext,    show: showNext,    setShow: setShowNext,    ph: "Enter new password" },
          { label: "Confirm New Password", value: confirm, set: setConfirm, show: showConfirm, setShow: setShowConfirm, ph: "Confirm new password" },
        ].map((f) => (
          <div key={f.label}>
            <label className="block text-sm font-medium text-[#241B3D] mb-1.5">{f.label}</label>
            <div className="relative">
              <input type={f.show ? "text" : "password"} value={f.value} placeholder={f.ph}
                onChange={(e) => f.set(e.target.value)}
                className="w-full border-2 border-[rgba(91,33,182,0.16)] rounded-xl px-4 py-2.5 text-sm text-[#241B3D] focus:outline-none focus:ring-2 focus:ring-[#7C3AED]/25 focus:border-[var(--border-strong)] transition-all" />
              <button type="button" onClick={() => f.setShow(!f.show)} className="absolute right-3 top-1/2 -translate-y-1/2 text-[#6b6880] hover:text-[#7C3AED]">
                {f.show ? <EyeOffIcon className="w-4 h-4" /> : <EyeIcon className="w-4 h-4" />}
              </button>
            </div>
          </div>
        ))}

        {next && (
          <div>
            <div className="flex gap-1.5 mb-1.5">
              {[0,1,2,3,4].map((i) => (
                <div key={i} className="h-1.5 flex-1 rounded-full transition-all duration-300"
                  style={{ background: i <= strength.score ? barColors[strength.score] : "rgba(91,33,182,0.16)" }}></div>
              ))}
            </div>
            <p className="text-xs font-medium" style={{ color: barColors[strength.score] }}>{strength.label}</p>
          </div>
        )}

        {next && (
          <div className="space-y-1.5">
            {reqs.map((r) => (
              <div key={r.label} className={`flex items-center gap-2 text-xs transition-all ${r.met ? "text-emerald-600 font-semibold" : "text-[#6b6880] opacity-60"}`}>
                <CheckIcon className="w-3.5 h-3.5" />{r.label}
              </div>
            ))}
          </div>
        )}

        <div className="flex gap-3 pt-2">
          <button className="flex items-center gap-2 px-5 py-2.5 rounded-xl bg-[#7C3AED] text-white text-sm font-semibold shadow-md shadow-violet-200 hover:bg-[#6d28d9] hover:scale-[1.03] active:scale-[0.97] transition-transform">
            <KeyIcon className="w-3.5 h-3.5" /> Save Password
          </button>
          <button className="px-5 py-2.5 rounded-xl border-2 border-[rgba(91,33,182,0.16)] text-[#6b6880] text-sm font-semibold hover: transition-colors">Cancel</button>
        </div>
      </div>
    </Card>
  );
}

/* ── API Configuration panel ───────────────────────────────── */
function ApiConfigPanel() {
  const [showKey, setShowKey] = useState(false);
  const [model, setModel] = useState("mixtral-8x7b-32768");
  const [temperature, setTemperature] = useState(0.7);
  const [maxTokens, setMaxTokens] = useState("2048");
  const [testing, setTesting] = useState(false);
  const [connected, setConnected] = useState(true);

  return (
    <Card className="overflow-hidden">
      <PanelHeader Icon={PlugIcon} title="API Key Configuration (Groq)" subtitle="Configure your API keys and endpoints for external integrations" />
      <div className="p-8 space-y-5 max-w-md">
        <div>
          <label className="block text-sm font-medium text-[#241B3D] mb-1.5">Groq API Key</label>
          <div className="relative">
            <input type={showKey ? "text" : "password"} readOnly value="gsk_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
              className="w-full border-2 border-[rgba(91,33,182,0.16)] rounded-xl px-4 py-2.5 text-sm text-[#241B3D] tracking-wider focus:outline-none" />
            <button type="button" onClick={() => setShowKey(!showKey)} className="absolute right-3 top-1/2 -translate-y-1/2 text-[#6b6880] hover:text-[#7C3AED]">
              {showKey ? <EyeOffIcon className="w-4 h-4" /> : <EyeIcon className="w-4 h-4" />}
            </button>
          </div>
        </div>
        <div className="flex items-center justify-between">
          <button type="button" onClick={() => { setTesting(true); setTimeout(() => { setTesting(false); setConnected(true); }, 1200); }}
            className="flex items-center gap-2 px-4 py-2 rounded-xl bg-[#7C3AED] text-white text-sm font-semibold shadow-md shadow-violet-200 hover:bg-[#6d28d9] hover:scale-[1.03] active:scale-[0.97] transition-transform">
            <ZapIcon className={`w-4 h-4 ${testing ? "spin" : ""}`} />{testing ? "Testing..." : "Test Connection"}
          </button>
          {connected && <span className="flex items-center gap-1.5 text-sm font-medium text-emerald-600">Connected <CheckIcon className="w-4 h-4" /></span>}
        </div>
        <div>
          <label className="block text-sm font-medium text-[#241B3D] mb-1.5">Model</label>
          <SelectField value={model} onChange={setModel} options={["mixtral-8x7b-32768","llama-3.1-70b-versatile","llama-3.1-8b-instant","gemma2-9b-it"]} />
        </div>
        <div>
          <label className="block text-sm font-medium text-[#241B3D] mb-1.5">Temperature</label>
          <div className="flex items-center gap-4">
            <input type="range" min="0" max="1" step="0.1" value={temperature} onChange={(e) => setTemperature(parseFloat(e.target.value))} className="flex-1 accent-[#7C3AED]" />
            <span className="w-14 text-center text-sm font-semibold text-[#241B3D] border-2 border-[rgba(91,33,182,0.16)] rounded-lg py-1.5">{temperature.toFixed(1)}</span>
          </div>
        </div>
        <div>
          <label className="block text-sm font-medium text-[#241B3D] mb-1.5">Max Tokens</label>
          <input type="number" value={maxTokens} onChange={(e) => setMaxTokens(e.target.value)}
            className="w-full border-2 border-[rgba(91,33,182,0.16)] rounded-xl px-4 py-2.5 text-sm text-[#241B3D] focus:outline-none focus:ring-2 focus:ring-[#7C3AED]/25 focus:border-[var(--border-strong)]" />
        </div>
        <div className="flex justify-end pt-2">
          <button className="flex items-center gap-2 px-5 py-2.5 rounded-xl bg-[#7C3AED] text-white text-sm font-semibold shadow-md shadow-violet-200 hover:bg-[#6d28d9] hover:scale-[1.03] active:scale-[0.97] transition-transform">
            Save Configuration
          </button>
        </div>
      </div>
    </Card>
  );
}

/* ── Knowledge Base panel ──────────────────────────────────── */
function KnowledgeBasePanel() {
  const [collectionName, setCollectionName] = useState("zeai_knowledge_base");
  const [embeddingModel, setEmbeddingModel] = useState("all-MiniLM-L6-v2");
  const [rebuilding, setRebuilding] = useState(false);

  return (
    <Card className="overflow-hidden">
      <PanelHeader Icon={DbIcon} title="Knowledge Base" subtitle="Manage your ChromaDB vector database connection and collections" />
      <div className="p-8 space-y-5 max-w-md">
        <div>
          <label className="block text-sm font-medium text-[#241B3D] mb-1.5">ChromaDB Path</label>
          <div className="flex gap-3">

/* ── Chat Management panel ─────────────────────────────────── */
function ChatManagementPanel() {
  const [autoDelete, setAutoDelete] = useState(true);
  const [retention, setRetention] = useState("90 Days");
  const [sessionTimeout, setSessionTimeout] = useState("30 Minutes");
  const [maxHistory, setMaxHistory] = useState("500");
  const [transcriptEmails, setTranscriptEmails] = useState(false);
  const [confirmClear, setConfirmClear] = useState(false);
  const [cleared, setCleared] = useState(false);
  const stats = [
    { label: "Total Chat Sessions", value: "3,482" },
    { label: "Active Today",        value: "214" },
    { label: "Avg. Session Length", value: "4m 12s" },
  ];

  function handleClear() {
    if (!confirmClear) { setConfirmClear(true); return; }
    setCleared(true); setConfirmClear(false);
    setTimeout(() => setCleared(false), 2000);
  }

  return (
    <Card className="overflow-hidden">
      <PanelHeader Icon={ChatsIcon} title="Chat Management" subtitle="Control chat retention, session limits, and history for your chatbot" />
      <div className="p-8 space-y-6 max-w-2xl">
        <div className="grid grid-cols-3 gap-4">
          {stats.map((s) => (
            <div key={s.label} className="status-card border-2 border-[rgba(91,33,182,0.16)] rounded-xl p-4">
              <p className="text-lg font-bold text-[#241B3D] leading-none">{s.value}</p>
              <p className="text-[11px] text-[#6b6880] mt-1.5">{s.label}</p>
            </div>
          ))}
        </div>
        <ToggleRow label="Auto-Delete Old Chats" description="Automatically remove chat logs older than the retention period." checked={autoDelete} onChange={() => setAutoDelete(!autoDelete)} />
        <div>
          <label className="block text-sm font-medium text-[#241B3D] mb-1.5">Chat Retention Period</label>
          <SelectField value={retention} onChange={setRetention} options={["30 Days","60 Days","90 Days","180 Days","Never Delete"]} />
        </div>
        <div>
          <label className="block text-sm font-medium text-[#241B3D] mb-1.5">Chat Session Timeout</label>
          <SelectField value={sessionTimeout} onChange={setSessionTimeout} options={["10 Minutes","15 Minutes","30 Minutes","60 Minutes"]} />
        </div>
        <div>
          <label className="block text-sm font-medium text-[#241B3D] mb-1.5">Max Stored Messages per User</label>
          <input type="number" value={maxHistory} onChange={(e) => setMaxHistory(e.target.value)}
            className="w-full border-2 border-[rgba(91,33,182,0.16)] rounded-xl px-4 py-2.5 text-sm text-[#241B3D] focus:outline-none focus:ring-2 focus:ring-[#7C3AED]/25 focus:border-[var(--border-strong)]" />
        </div>
        <div className="flex items-center justify-between">
          <div className="flex items-start gap-2.5">
            <MailIcon className="w-4 h-4 text-[#7C3AED] flex-shrink-0 mt-0.5" />
            <div>
              <p className="text-sm font-medium text-[#241B3D]">Email Chat Transcripts</p>
              <p className="text-xs text-[#6b6880] mt-0.5">Send admin a copy of completed chat sessions.</p>
            </div>
          </div>
          <Toggle checked={transcriptEmails} onChange={() => setTranscriptEmails(!transcriptEmails)} />
        </div>
        <div className="flex items-center justify-between pt-4 border-t border-[#f0edf9]">
          <button className="flex items-center gap-2 px-4 py-2 rounded-xl border-2 border-[rgba(91,33,182,0.16)] text-[#7C3AED] text-sm font-semibold hover: transition-colors">
            <DownloadIcon className="w-4 h-4" /> Export Chat Logs
          </button>
          <div className="flex items-center gap-3">
            {cleared && <span className="flex items-center gap-1.5 text-sm font-medium text-emerald-600"><CheckIcon className="w-4 h-4" /> History cleared</span>}
            <button onClick={handleClear} onBlur={() => setConfirmClear(false)}
              className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold transition-colors border-2 ${confirmClear ? "bg-red-500 border-red-500 text-white hover:bg-red-600" : "border-red-200 text-red-500 hover:bg-red-50"}`}>
              <TrashIcon className="w-4 h-4" />{confirmClear ? "Click again to confirm" : "Clear All Chat History"}
            </button>
          </div>
        </div>
      </div>
    </Card>
  );
}

/* ── Notifications panel ───────────────────────────────────── */
function NotificationsPanel() {
  const [prefs, setPrefs] = useState({ email: true, newChat: true, weeklyReport: false, systemAlerts: true, faqUpdates: false });
  const toggle = (k) => setPrefs((p) => ({ ...p, [k]: !p[k] }));
  const rows = [
    { key: "email",        label: "Email Notifications",   description: "Receive important updates via email" },
    { key: "newChat",      label: "New Chat Alerts",       description: "Get notified when a new chat session starts" },
    { key: "weeklyReport", label: "Weekly Summary Report", description: "A digest of queries, FAQs, and activity every Monday" },
    { key: "systemAlerts", label: "System Alerts",         description: "Notify me if API, database, or vector DB status changes" },
    { key: "faqUpdates",   label: "FAQ Update Alerts",     description: "Notify me when FAQs are added or edited" },
  ];
  return (
    <Card className="overflow-hidden">
      <PanelHeader Icon={BellIcon} title="Notifications" subtitle="Choose what you want to be notified about" />
      <div className="p-8 space-y-3 max-w-md">
        {rows.map((r) => <ToggleRow key={r.key} label={r.label} description={r.description} checked={prefs[r.key]} onChange={() => toggle(r.key)} />)}
      </div>
    </Card>
  );
}
