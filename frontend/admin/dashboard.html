  /* ── animated background blobs ─────────────────────────── */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.30;
    pointer-events: none;
    z-index: 0;
    animation: blobFloat 20s ease-in-out infinite;
  }
  .blob-1 { width: 500px; height: 500px; background: #a78bfa; top: 60px; right: 60px; animation-duration: 24s; }
  .blob-2 { width: 450px; height: 450px; background: #7c3aed; bottom: 40px; left: 60px; animation-duration: 18s; animation-delay: -6s; }
  @keyframes blobFloat {
    0%   { transform: translate(0,0) scale(1); }
    25%  { transform: translate(40px,60px) scale(1.1); }
    50%  { transform: translate(-30px,30px) scale(0.95); }
    75%  { transform: translate(30px,-40px) scale(1.05); }
    100% { transform: translate(0,0) scale(1); }
  }

  /* ── card hover lift ───────────────────────────────────── */
  .hover-card {
    transition: transform 0.25s cubic-bezier(.22,1,.36,1), box-shadow 0.25s ease, border-color 0.25s ease;
  }
  .hover-card:hover {
    transform: translateY(-5px) scale(1.015);
    border-color: var(--border-strong) !important;
    box-shadow: 0 12px 32px rgba(124,58,237,0.18) !important;

/* ── Manual SVG Area Chart (no chart library) ─────────────── */
function AreaChart({ data }) {
  const w = 560, h = 185, padL = 34, padB = 22, padT = 10;
  const max = 1800;
  const stepX = (w - padL - 10) / (data.length - 1);
  const yFor = (v) => padT + (h - padT - padB) * (1 - v / max);
  const points = data.map((p, i) => [padL + i * stepX, yFor(p.v)]);
  const linePath = points.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(" ");
  const areaPath = `${linePath} L${points[points.length - 1][0]},${h - padB} L${points[0][0]},${h - padB} Z`;
  const yTicks = [0, 450, 900, 1350, 1800];

  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
      <defs>
        <linearGradient id="qGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="5%"  stopColor="#7C3AED" stopOpacity="0.18" />
          <stop offset="95%" stopColor="#7C3AED" stopOpacity="0" />
        </linearGradient>
      </defs>
      {yTicks.map((t) => (
        <g key={t}>
          <line x1={padL} y1={yFor(t)} x2={w-6} y2={yFor(t)} stroke="#f0eef8" strokeDasharray="3 3" />
          <text x={padL - 8} y={yFor(t) + 3} fontSize="9" fill="#6b6880" textAnchor="end">{t}</text>
        </g>
      ))}
      {data.map((p, i) => (
        <text key={p.d} x={padL + i * stepX} y={h - 6} fontSize="9" fill="#6b6880" textAnchor="middle">{p.d}</text>
      ))}
      <path d={areaPath} fill="url(#qGrad)" />
      <path d={linePath} fill="none" stroke="#7C3AED" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
      {points.map((p, i) => (
        <circle key={i} cx={p[0]} cy={p[1]} r="3.5" fill="#7C3AED" stroke="#fff" strokeWidth="2" />
      ))}
    </svg>
  );
}

/* ── Manual SVG Donut Chart ────────────────────────────────── */
function DonutChart({ data }) {
  const cx = 75, cy = 65, r = 52, stroke = 20;
  const circumference = 2 * Math.PI * r;
  let offset = 0;
  return (
    <svg width="160" height="140" viewBox="0 0 150 140">
      {data.map((d, i) => {
        const dash = (d.value / 100) * circumference;
        const seg = (
          <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color} strokeWidth={stroke}
            strokeDasharray={`${dash} ${circumference - dash}`} strokeDashoffset={-offset}
            transform={`rotate(-90 ${cx} ${cy})`} />
        );
        offset += dash;
        return seg;
      })}
    </svg>
  );
}

                  <div key={name} className="hover-row flex items-start gap-3 px-5 py-3.5 cursor-default">
                    <div className={`w-8 h-8 rounded-full ${color} flex items-center justify-center text-white text-[10px] font-bold flex-shrink-0 mt-0.5`}>{initials}</div>
                    <div className="flex-1 min-w-0">
                      <p className="text-xs font-semibold text-[#241B3D] truncate">{name}</p>
                      <p className="text-[11px] text-[#6b6880] truncate mt-0.5">{message}</p>
                    </div>
                    <div className="flex items-center gap-1 text-[10px] text-[#6b6880] flex-shrink-0 mt-0.5">
                      <ClockIcon className="w-2.5 h-2.5" />{time}
                    </div>
                  </div>
                ))}
              </div>
            </Card>

            <Card className="flex flex-col">
              <div className="flex items-center justify-between px-5 pt-5 pb-3 border-b border-[#f0edf9]">
                <h2 className="font-semibold text-sm text-[#241B3D]">FAQs by Category</h2>
                <button className="text-[11px] font-medium text-[#7C3AED] hover:underline">This Week</button>
              </div>
              <div className="flex flex-col items-center flex-1 py-3 px-4">
                <DonutChart data={faqCategories} />
                <div className="w-full mt-1 space-y-1.5">
                  {faqCategories.map(({ name, value, color }) => (
                    <div key={name} className="flex items-center justify-between text-[11px]">
                      <div className="flex items-center gap-1.5">
                        <span className="w-2 h-2 rounded-full flex-shrink-0" style={{background:color}}></span>
                        <span className="text-[#6b6880]">{name}</span>
                      </div>
                      <span className="font-semibold text-[#241B3D]">{value}%</span>
                    </div>
                  ))}
                </div>
              </div>
            </Card>
          </div>

          {/* Bottom row */}
          <div className="grid grid-cols-2 gap-5">
            <Card>
              <div className="flex items-center justify-between px-6 pt-5 pb-3 border-b border-[#f0edf9]">
                <h2 className="font-semibold text-sm text-[#241B3D]">Top Asked Questions</h2>
                <button className="text-[11px] font-medium text-[#7C3AED] hover:underline flex items-center gap-1">
                  <EyeIcon className="w-3 h-3" /> View All
                </button>
              </div>
              <div className="px-6 py-3 space-y-1">
                {topFAQs.map(({ question, count }, idx) => (
                  <div key={question} className="hover-row-q flex items-center gap-3 px-3 py-3 rounded-xl cursor-default">
                    <span className="w-6 h-6 rounded-lg  text-[#7C3AED] text-[10px] font-bold flex items-center justify-center flex-shrink-0">{idx+1}</span>
                    <p className="flex-1 text-[13px] text-[#241B3D] font-medium truncate">{question}</p>
                    <span className="flex items-center gap-1  text-[#7C3AED] text-[11px] font-semibold px-2.5 py-1 rounded-full flex-shrink-0">
                      <HashIcon className="w-2.5 h-2.5" />{count}
                    </span>
                  </div>
                ))}
              </div>
            </Card>

            <Card>
              <div className="flex items-center justify-between px-6 pt-5 pb-3 border-b border-[#f0edf9]">
                <h2 className="font-semibold text-sm text-[#241B3D]">System Overview</h2>
                <div className="flex items-center gap-1.5 text-[11px] font-medium text-emerald-600 bg-emerald-50 px-2.5 py-1 rounded-full">
                  <span className="w-1.5 h-1.5 bg-emerald-500 rounded-full pulse-dot"></span>All Systems Operational
                </div>
              </div>
              <div className="p-6 grid grid-cols-2 gap-4">
                {systemStatuses.map(({ label, Icon: I, status, iconBg, iconColor }) => (
                  <div key={label} className="status-card border-2 border-[rgba(91,33,182,0.16)] rounded-xl p-4 flex items-center gap-3 cursor-default">
                    <div className={`w-10 h-10 rounded-xl ${iconBg} flex items-center justify-center flex-shrink-0`}>
                      <I className={`w-5 h-5 ${iconColor}`} />
                    </div>
                    <div>
                      <p className="text-sm font-semibold text-[#241B3D]">{label}</p>
                      <span className="inline-flex items-center gap-1 text-[11px] font-medium text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-full mt-0.5">
                        <span className="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span>{status}
                      </span>
                    </div>
                  </div>
                ))}
              </div>
            </Card>
          </div>

          <footer className="border-t border-[rgba(91,33,182,0.16)] mt-8 pt-4 flex items-center justify-center">
            <p className="text-xs text-[#6b6880]">© 2026 <span className="font-semibold text-[#241B3D]">ZeAI Soft</span>. All rights reserved.</p>
          </footer>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
</script>
</body>
</html>
